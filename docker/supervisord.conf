[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid

# ── PostgreSQL 16 ────────────────────────────────────────
[program:postgresql]
command=/usr/lib/postgresql/16/bin/postgres -D /var/lib/postgresql/data
user=postgres
autostart=true
autorestart=true
stdout_logfile=/var/log/postgresql.log
stderr_logfile=/var/log/postgresql_err.log
priority=10

# ── Redis 7 ─────────────────────────────────────────────
[program:redis]
command=/usr/bin/redis-server --bind 127.0.0.1 --port 6379 --loglevel warning \
        --save 900 1 --save 300 10 --dbfilename dump.rdb --dir /var/lib/redis
autostart=true
autorestart=true
stdout_logfile=/var/log/redis.log
stderr_logfile=/var/log/redis_err.log
priority=20

# ── Neo4j 5 CE ───────────────────────────────────────────
[program:neo4j]
command=/opt/neo4j/bin/neo4j console
user=neo4j
autostart=true
autorestart=true
stdout_logfile=/var/log/neo4j.log
stderr_logfile=/var/log/neo4j_err.log
priority=15
startsecs=20
startretries=3
environment=
    NEO4J_HOME="/opt/neo4j",
    NEO4J_dbms_security_auth__enabled="true",
    NEO4J_dbms_connector_bolt_listen__address="0.0.0.0:7687",
    NEO4J_dbms_connector_http_listen__address="0.0.0.0:7474",
    NEO4J_dbms_memory_heap_initial__size="256m",
    NEO4J_dbms_memory_heap_max__size="512m",
    NEO4J_dbms_memory_pagecache_size="128m"

# ── Qdrant 1.12 ──────────────────────────────────────────
[program:qdrant]
command=/usr/local/bin/qdrant
directory=/var/lib/qdrant
autostart=true
autorestart=true
stdout_logfile=/var/log/qdrant.log
stderr_logfile=/var/log/qdrant_err.log
priority=25
startsecs=5
startretries=3
environment=
    QDRANT__STORAGE__STORAGE_PATH="/var/lib/qdrant/storage",
    QDRANT__SERVICE__HTTP_PORT="6333",
    QDRANT__SERVICE__GRPC_PORT="6334",
    QDRANT__LOG_LEVEL="WARN"

# ── Python sidecar (LangGraph agent + FastAPI) ────────────
[program:python-sidecar]
command=python -m uvicorn main:app --host 0.0.0.0 --port 8081 --workers 1
directory=/app/python-sidecar
autostart=true
autorestart=true
stdout_logfile=/var/log/python-sidecar.log
stderr_logfile=/var/log/python-sidecar_err.log
startsecs=10
startretries=3
priority=30
environment=
    DATABASE_URL="postgresql://%(ENV_DB_USER)s:%(ENV_DB_PASSWORD)s@%(ENV_DB_HOST)s:%(ENV_DB_PORT)s/%(ENV_DB_NAME)s",
    REDIS_URL="redis://127.0.0.1:6379",
    NEO4J_URI="bolt://127.0.0.1:7687",
    NEO4J_USER="%(ENV_NEO4J_USER)s",
    NEO4J_PASSWORD="%(ENV_NEO4J_PASSWORD)s",
    QDRANT_URL="http://127.0.0.1:6333"

# ── Go backend (Gin API gateway) ─────────────────────────
[program:go-backend]
command=/app/server
directory=/app
autostart=true
autorestart=true
stdout_logfile=/var/log/go-backend.log
stderr_logfile=/var/log/go-backend_err.log
startsecs=5
startretries=3
priority=40
environment=
    GIN_MODE="release"

