[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid

[program:postgresql]
command=/usr/lib/postgresql/16/bin/postgres -D /var/lib/postgresql/data
user=postgres
autostart=true
autorestart=true
stdout_logfile=/var/log/postgresql.log
stderr_logfile=/var/log/postgresql_err.log
priority=10
startsecs=3
startretries=5

[program:redis]
command=/usr/bin/redis-server --bind 127.0.0.1 --port 6379 --loglevel warning --save 900 1 --save 300 10 --dbfilename dump.rdb --dir /var/lib/redis
user=redis
autostart=true
autorestart=true
stdout_logfile=/var/log/redis.log
stderr_logfile=/var/log/redis_err.log
priority=15
startsecs=3
startretries=5

[program:qdrant]
command=/usr/local/bin/qdrant
directory=/var/lib/qdrant
autostart=true
autorestart=unexpected
stdout_logfile=/var/log/qdrant.log
stderr_logfile=/var/log/qdrant_err.log
priority=25
startsecs=5
startretries=5
environment=QDRANT__SERVICE__HTTP_PORT="6333",QDRANT__SERVICE__GRPC_PORT="6334",QDRANT__LOG_LEVEL="WARN",QDRANT__STORAGE__STORAGE_PATH="/var/lib/qdrant/storage"

[program:python-sidecar]
command=/app/docker/wait-for-pg.sh /app/docker/wait-for-port.sh 127.0.0.1 6379 redis /app/docker/wait-for-port.sh 127.0.0.1 6333 qdrant python -m uvicorn main:app --host 0.0.0.0 --port 8081 --workers 1
directory=/app/python-sidecar
autostart=true
autorestart=true
stdout_logfile=/var/log/python-sidecar.log
stderr_logfile=/var/log/python-sidecar_err.log
startsecs=10
startretries=5
priority=30
environment=REDIS_URL="redis://127.0.0.1:6379",NEO4J_URI="",QDRANT_URL="http://127.0.0.1:6333"

[program:go-backend]
command=/app/docker/wait-for-pg.sh /app/docker/wait-for-port.sh 127.0.0.1 6379 redis /app/docker/wait-for-port.sh 127.0.0.1 8081 python-sidecar /app/server
directory=/app
autostart=true
autorestart=true
stdout_logfile=/var/log/go-backend.log
stderr_logfile=/var/log/go-backend_err.log
startsecs=5
startretries=10
priority=40
environment=GIN_MODE="release",APP_PROFILE="no-neo4j",NEO4J_URI=""
