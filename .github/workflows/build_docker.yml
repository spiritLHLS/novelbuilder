name: Build Docker Images and Binaries

on:
  workflow_dispatch:
    inputs:
      image_set:
        description: "Images to build. Use app for fast smoke/release checks; all includes every Docker profile."
        required: true
        default: app
        type: choice
        options:
          - app
          - base
          - all
      platforms:
        description: "Docker target platforms. Multi-arch uses QEMU on GitHub-hosted x64 runners and is much slower."
        required: true
        default: linux/amd64
        type: choice
        options:
          - linux/amd64
          - linux/amd64,linux/arm64
      accelerator:
        description: "Torch accelerator build for vector-capable images. cuda is linux/amd64 only."
        required: true
        default: cpu
        type: choice
        options:
          - cpu
          - cuda
      build_binaries:
        description: "Build and upload cross-platform binary packages."
        required: true
        default: true
        type: boolean
  push:
    tags:
      - "v*"

concurrency:
  group: build-docker-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKER_IMAGE: spiritlhl/novelbuilder
  IMAGE_SET: ${{ github.event_name == 'workflow_dispatch' && inputs.image_set || 'all' }}
  IMAGE_PLATFORMS: ${{ github.event_name == 'workflow_dispatch' && inputs.platforms || 'linux/amd64' }}
  IMAGE_ACCELERATOR: ${{ github.event_name == 'workflow_dispatch' && inputs.accelerator || 'cpu' }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  docker-base:
    name: docker base (${{ matrix.profile }})
    runs-on: ubuntu-latest
    timeout-minutes: 3600
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - profile: full
            dockerfile: Dockerfile
          - profile: standard
            dockerfile: Dockerfile.standard
          - profile: app
            dockerfile: Dockerfile.app

    steps:
      - name: Decide profile
        id: selected
        shell: bash
        run: |
          enabled=false
          case "${IMAGE_SET}" in
            all|base)
              enabled=true
              ;;
            app)
              if [ "${{ matrix.profile }}" = "app" ]; then
                enabled=true
              fi
              ;;
            *)
              echo "Unsupported IMAGE_SET=${IMAGE_SET}" >&2
              exit 1
              ;;
          esac
          if [ "${IMAGE_ACCELERATOR}" = "cuda" ] && [ "${IMAGE_PLATFORMS}" != "linux/amd64" ]; then
            echo "CUDA Docker builds are supported only with platforms=linux/amd64." >&2
            exit 1
          fi

          platform_scope="$(printf '%s' "${IMAGE_PLATFORMS}" | tr '/,' '--' | tr -cs 'A-Za-z0-9_.-' '-')"
          echo "enabled=${enabled}" >> "$GITHUB_OUTPUT"
          echo "platform_scope=${platform_scope}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        if: steps.selected.outputs.enabled == 'true'
        with:
          submodules: recursive

      - name: Resolve tags
        id: meta
        if: steps.selected.outputs.enabled == 'true'
        shell: bash
        run: |
          date_tag="$(date +'%Y%m%d')"
          run_tag="run-${GITHUB_RUN_ID}"
          version="${GITHUB_REF_NAME:-dev}"
          profile="${{ matrix.profile }}"
          accelerator="${IMAGE_ACCELERATOR}"
          tag_profile="${profile}"
          cache_profile="${profile}"
          case "${profile}" in
            full|app)
              tag_profile="${profile}-${accelerator}"
              cache_profile="${profile}-${accelerator}"
              ;;
          esac
          dockerhub="${{ env.DOCKER_IMAGE }}:${tag_profile},${{ env.DOCKER_IMAGE }}:${date_tag}-${tag_profile},${{ env.DOCKER_IMAGE }}:${run_tag}-${tag_profile}"
          ghcr_owner="${GITHUB_REPOSITORY_OWNER,,}"
          ghcr_repo="${GITHUB_REPOSITORY#*/}"
          ghcr_image="ghcr.io/${ghcr_owner}/${ghcr_repo}"
          ghcr="${ghcr_image}:${tag_profile},${ghcr_image}:${date_tag}-${tag_profile},${ghcr_image}:${run_tag}-${tag_profile}"
          if [ "${profile}" = "full" ]; then
            dockerhub="${dockerhub},${{ env.DOCKER_IMAGE }}:latest-${accelerator},${{ env.DOCKER_IMAGE }}:${date_tag}-${accelerator}"
            ghcr="${ghcr},${ghcr_image}:latest-${accelerator},${ghcr_image}:${date_tag}-${accelerator}"
            if [ "${accelerator}" = "cpu" ]; then
              dockerhub="${dockerhub},${{ env.DOCKER_IMAGE }}:latest,${{ env.DOCKER_IMAGE }}:${date_tag},${{ env.DOCKER_IMAGE }}:full,${{ env.DOCKER_IMAGE }}:${date_tag}-full,${{ env.DOCKER_IMAGE }}:${run_tag}-full"
              ghcr="${ghcr},${ghcr_image}:latest,${ghcr_image}:${date_tag},${ghcr_image}:full,${ghcr_image}:${date_tag}-full,${ghcr_image}:${run_tag}-full"
            fi
          elif [ "${accelerator}" = "cpu" ] && { [ "${profile}" = "app" ]; }; then
            dockerhub="${dockerhub},${{ env.DOCKER_IMAGE }}:${profile},${{ env.DOCKER_IMAGE }}:${date_tag}-${profile},${{ env.DOCKER_IMAGE }}:${run_tag}-${profile}"
            ghcr="${ghcr},${ghcr_image}:${profile},${ghcr_image}:${date_tag}-${profile},${ghcr_image}:${run_tag}-${profile}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "date_tag=${date_tag}" >> "$GITHUB_OUTPUT"
          echo "accelerator=${accelerator}" >> "$GITHUB_OUTPUT"
          echo "cache_profile=${cache_profile}" >> "$GITHUB_OUTPUT"
          echo "dockerhub=${dockerhub}" >> "$GITHUB_OUTPUT"
          echo "ghcr=${ghcr}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v4
        if: steps.selected.outputs.enabled == 'true' && contains(env.IMAGE_PLATFORMS, 'arm64')

      - uses: docker/setup-buildx-action@v4
        if: steps.selected.outputs.enabled == 'true'

      - name: Login to Docker Hub
        id: login-dockerhub
        if: steps.selected.outputs.enabled == 'true'
        continue-on-error: true
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        id: login-ghcr
        if: steps.selected.outputs.enabled == 'true'
        continue-on-error: true
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Collect image tags
        id: tags
        if: steps.selected.outputs.enabled == 'true'
        shell: bash
        run: |
          tags=""
          append_csv_tags() {
            local csv="$1"
            local tag
            IFS=',' read -r -a tag_list <<< "${csv}"
            for tag in "${tag_list[@]}"; do
              if [ -n "${tag}" ]; then
                tags+="${tag}"$'\n'
              fi
            done
          }

          if [ "${{ steps.login-dockerhub.outcome }}" = "success" ]; then
            append_csv_tags "${{ steps.meta.outputs.dockerhub }}"
          fi
          if [ "${{ steps.login-ghcr.outcome }}" = "success" ]; then
            append_csv_tags "${{ steps.meta.outputs.ghcr }}"
          fi

          if [ -z "${tags}" ]; then
            echo "push_enabled=false" >> "$GITHUB_OUTPUT"
            echo "No registry login succeeded; skipping Docker push."
            exit 0
          fi

          echo "push_enabled=true" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            printf "%s" "${tags}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push image
        if: steps.selected.outputs.enabled == 'true' && steps.tags.outputs.push_enabled == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ env.IMAGE_PLATFORMS }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          provenance: false
          sbom: false
          build-args: |
            SERVER_VERSION=${{ steps.meta.outputs.version }}
            BUILD_PROFILE=${{ matrix.profile }}
            NB_ACCELERATOR=${{ steps.meta.outputs.accelerator }}
            UPX_ENABLED=false
          cache-from: type=gha,scope=docker-${{ steps.meta.outputs.cache_profile }}-${{ steps.selected.outputs.platform_scope }}
          cache-to: type=gha,mode=max,scope=docker-${{ steps.meta.outputs.cache_profile }}-${{ steps.selected.outputs.platform_scope }}

      - name: Update Docker Hub description
        if: steps.selected.outputs.enabled == 'true' && steps.login-dockerhub.outcome == 'success' && matrix.profile == 'full'
        continue-on-error: true
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.DOCKER_IMAGE }}
          readme-filepath: ./README.md

  docker-variants:
    name: docker variant (${{ matrix.profile }})
    if: github.event_name != 'workflow_dispatch' || inputs.image_set == 'all'
    runs-on: ubuntu-latest
    timeout-minutes: 3600
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - profile: no-neo4j
            dockerfile: Dockerfile.no-neo4j
          - profile: no-qdrant
            dockerfile: Dockerfile.no-qdrant
          - profile: no-graph-vector
            dockerfile: Dockerfile.no-graph-vector
          - profile: no-redis
            dockerfile: Dockerfile.no-redis
          - profile: sqlite
            dockerfile: Dockerfile.sqlite

    steps:
      - uses: actions/checkout@v6

      - name: Resolve tags
        id: meta
        shell: bash
        run: |
          date_tag="$(date +'%Y%m%d')"
          run_tag="run-${GITHUB_RUN_ID}"
          version="${GITHUB_REF_NAME:-dev}"
          profile="${{ matrix.profile }}"
          accelerator="${IMAGE_ACCELERATOR}"
          tag_profile="${profile}"
          cache_profile="${profile}"
          case "${profile}" in
            no-neo4j|no-qdrant)
              tag_profile="${profile}-${accelerator}"
              cache_profile="${profile}-${accelerator}"
              ;;
          esac
          dockerhub="${{ env.DOCKER_IMAGE }}:${tag_profile},${{ env.DOCKER_IMAGE }}:${date_tag}-${tag_profile},${{ env.DOCKER_IMAGE }}:${run_tag}-${tag_profile}"
          ghcr_owner="${GITHUB_REPOSITORY_OWNER,,}"
          ghcr_repo="${GITHUB_REPOSITORY#*/}"
          ghcr_image="ghcr.io/${ghcr_owner}/${ghcr_repo}"
          ghcr="${ghcr_image}:${tag_profile},${ghcr_image}:${date_tag}-${tag_profile},${ghcr_image}:${run_tag}-${tag_profile}"
          if [ "${accelerator}" = "cpu" ] && [ "${tag_profile}" != "${profile}" ]; then
            dockerhub="${dockerhub},${{ env.DOCKER_IMAGE }}:${profile},${{ env.DOCKER_IMAGE }}:${date_tag}-${profile},${{ env.DOCKER_IMAGE }}:${run_tag}-${profile}"
            ghcr="${ghcr},${ghcr_image}:${profile},${ghcr_image}:${date_tag}-${profile},${ghcr_image}:${run_tag}-${profile}"
          fi
          platform_scope="$(printf '%s' "${IMAGE_PLATFORMS}" | tr '/,' '--' | tr -cs 'A-Za-z0-9_.-' '-')"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "dockerhub=${dockerhub}" >> "$GITHUB_OUTPUT"
          echo "ghcr=${ghcr}" >> "$GITHUB_OUTPUT"
          echo "platform_scope=${platform_scope}" >> "$GITHUB_OUTPUT"
          echo "accelerator=${accelerator}" >> "$GITHUB_OUTPUT"
          echo "cache_profile=${cache_profile}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v4
        if: contains(env.IMAGE_PLATFORMS, 'arm64')

      - uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        id: login-dockerhub
        continue-on-error: true
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        id: login-ghcr
        continue-on-error: true
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Collect image tags
        id: tags
        shell: bash
        run: |
          tags=""
          append_csv_tags() {
            local csv="$1"
            local tag
            IFS=',' read -r -a tag_list <<< "${csv}"
            for tag in "${tag_list[@]}"; do
              if [ -n "${tag}" ]; then
                tags+="${tag}"$'\n'
              fi
            done
          }

          if [ "${{ steps.login-dockerhub.outcome }}" = "success" ]; then
            append_csv_tags "${{ steps.meta.outputs.dockerhub }}"
          fi
          if [ "${{ steps.login-ghcr.outcome }}" = "success" ]; then
            append_csv_tags "${{ steps.meta.outputs.ghcr }}"
          fi

          if [ -z "${tags}" ]; then
            echo "push_enabled=false" >> "$GITHUB_OUTPUT"
            echo "No registry login succeeded; skipping Docker push."
            exit 0
          fi

          echo "push_enabled=true" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            printf "%s" "${tags}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push image
        if: steps.tags.outputs.push_enabled == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ env.IMAGE_PLATFORMS }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          provenance: false
          sbom: false
          build-args: |
            SERVER_VERSION=${{ steps.meta.outputs.version }}
            BUILD_PROFILE=${{ matrix.profile }}
            NB_ACCELERATOR=${{ steps.meta.outputs.accelerator }}
          cache-from: type=gha,scope=docker-${{ steps.meta.outputs.cache_profile }}-${{ steps.meta.outputs.platform_scope }}
          cache-to: type=gha,mode=max,scope=docker-${{ steps.meta.outputs.cache_profile }}-${{ steps.meta.outputs.platform_scope }}

  binaries:
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || inputs.build_binaries
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-go@v6
        with:
          go-version: "1.22"
          cache-dependency-path: backend/go.sum

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install UPX
        continue-on-error: true
        run: |
          sudo apt-get update
          sudo apt-get install -y upx-ucl || sudo apt-get install -y upx

      - name: Build binary packages
        run: VERSION="${GITHUB_REF_NAME:-dev}" UPX_ENABLED=auto ./scripts/build-binaries.sh

      - name: Upload binary packages
        uses: actions/upload-artifact@v6
        with:
          name: novelbuilder-binaries
          path: dist/binaries/*
          if-no-files-found: error
