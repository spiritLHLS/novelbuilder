name: Build Docker Images and Binaries

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  DOCKER_IMAGE: spiritlhl/novelbuilder

jobs:
  docker-base:
    name: docker base (${{ matrix.profile }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - profile: full
            dockerfile: Dockerfile
          - profile: standard
            dockerfile: Dockerfile.standard
          - profile: app
            dockerfile: Dockerfile.app

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Resolve tags
        id: meta
        run: |
          date_tag="$(date +'%Y%m%d')"
          run_tag="run-${GITHUB_RUN_ID}"
          version="${GITHUB_REF_NAME:-dev}"
          profile="${{ matrix.profile }}"
          dockerhub="${{ env.DOCKER_IMAGE }}:${profile},${{ env.DOCKER_IMAGE }}:${date_tag}-${profile},${{ env.DOCKER_IMAGE }}:${run_tag}-${profile}"
          ghcr_owner="${GITHUB_REPOSITORY_OWNER,,}"
          ghcr_repo="${GITHUB_REPOSITORY#*/}"
          ghcr_image="ghcr.io/${ghcr_owner}/${ghcr_repo}"
          ghcr="${ghcr_image}:${profile},${ghcr_image}:${date_tag}-${profile},${ghcr_image}:${run_tag}-${profile}"
          if [ "${profile}" = "full" ]; then
            dockerhub="${dockerhub},${{ env.DOCKER_IMAGE }}:latest,${{ env.DOCKER_IMAGE }}:${date_tag}"
            ghcr="${ghcr},${ghcr_image}:latest,${ghcr_image}:${date_tag}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "date_tag=${date_tag}" >> "$GITHUB_OUTPUT"
          echo "dockerhub=${dockerhub}" >> "$GITHUB_OUTPUT"
          echo "ghcr=${ghcr}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        id: login-dockerhub
        continue-on-error: true
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        id: login-ghcr
        continue-on-error: true
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker Hub image
        if: steps.login-dockerhub.outcome == 'success'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.dockerhub }}
          build-args: |
            SERVER_VERSION=${{ steps.meta.outputs.version }}
            BUILD_PROFILE=${{ matrix.profile }}
            UPX_ENABLED=true
          cache-from: type=gha,scope=dockerhub-${{ matrix.profile }}
          cache-to: type=gha,mode=max,scope=dockerhub-${{ matrix.profile }}

      - name: Build and push GHCR image
        if: steps.login-ghcr.outcome == 'success'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.ghcr }}
          build-args: |
            SERVER_VERSION=${{ steps.meta.outputs.version }}
            BUILD_PROFILE=${{ matrix.profile }}
            UPX_ENABLED=true
          cache-from: type=gha,scope=ghcr-${{ matrix.profile }}
          cache-to: type=gha,mode=max,scope=ghcr-${{ matrix.profile }}

      - name: Update Docker Hub description
        if: steps.login-dockerhub.outcome == 'success' && matrix.profile == 'full'
        continue-on-error: true
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.DOCKER_IMAGE }}
          readme-filepath: ./README.md

  docker-variants:
    name: docker variant (${{ matrix.profile }})
    needs: docker-base
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - profile: no-neo4j
            dockerfile: Dockerfile.no-neo4j
            base_profile: full
          - profile: no-qdrant
            dockerfile: Dockerfile.no-qdrant
            base_profile: full
          - profile: no-graph-vector
            dockerfile: Dockerfile.no-graph-vector
            base_profile: standard
          - profile: no-redis
            dockerfile: Dockerfile.no-redis
            base_profile: standard
          - profile: sqlite
            dockerfile: Dockerfile.sqlite
            base_profile: app

    steps:
      - uses: actions/checkout@v4

      - name: Resolve tags
        id: meta
        run: |
          date_tag="$(date +'%Y%m%d')"
          run_tag="run-${GITHUB_RUN_ID}"
          version="${GITHUB_REF_NAME:-dev}"
          profile="${{ matrix.profile }}"
          dockerhub="${{ env.DOCKER_IMAGE }}:${profile},${{ env.DOCKER_IMAGE }}:${date_tag}-${profile},${{ env.DOCKER_IMAGE }}:${run_tag}-${profile}"
          dockerhub_base="${{ env.DOCKER_IMAGE }}:${run_tag}-${{ matrix.base_profile }}"
          ghcr_owner="${GITHUB_REPOSITORY_OWNER,,}"
          ghcr_repo="${GITHUB_REPOSITORY#*/}"
          ghcr_image="ghcr.io/${ghcr_owner}/${ghcr_repo}"
          ghcr="${ghcr_image}:${profile},${ghcr_image}:${date_tag}-${profile},${ghcr_image}:${run_tag}-${profile}"
          ghcr_base="${ghcr_image}:${run_tag}-${{ matrix.base_profile }}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "dockerhub=${dockerhub}" >> "$GITHUB_OUTPUT"
          echo "dockerhub_base=${dockerhub_base}" >> "$GITHUB_OUTPUT"
          echo "ghcr=${ghcr}" >> "$GITHUB_OUTPUT"
          echo "ghcr_base=${ghcr_base}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        id: login-dockerhub
        continue-on-error: true
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        id: login-ghcr
        continue-on-error: true
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker Hub image
        if: steps.login-dockerhub.outcome == 'success'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.dockerhub }}
          build-args: |
            SERVER_VERSION=${{ steps.meta.outputs.version }}
            BUILD_PROFILE=${{ matrix.profile }}
            BASE_IMAGE=${{ steps.meta.outputs.dockerhub_base }}
          cache-from: type=gha,scope=dockerhub-${{ matrix.profile }}
          cache-to: type=gha,mode=max,scope=dockerhub-${{ matrix.profile }}

      - name: Build and push GHCR image
        if: steps.login-ghcr.outcome == 'success'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.ghcr }}
          build-args: |
            SERVER_VERSION=${{ steps.meta.outputs.version }}
            BUILD_PROFILE=${{ matrix.profile }}
            BASE_IMAGE=${{ steps.meta.outputs.ghcr_base }}
          cache-from: type=gha,scope=ghcr-${{ matrix.profile }}
          cache-to: type=gha,mode=max,scope=ghcr-${{ matrix.profile }}

  binaries:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install UPX
        continue-on-error: true
        run: |
          sudo apt-get update
          sudo apt-get install -y upx-ucl || sudo apt-get install -y upx

      - name: Build binary packages
        run: VERSION="${GITHUB_REF_NAME:-dev}" UPX_ENABLED=auto ./scripts/build-binaries.sh

      - name: Upload binary packages
        uses: actions/upload-artifact@v4
        with:
          name: novelbuilder-binaries
          path: dist/binaries/*
          if-no-files-found: error
