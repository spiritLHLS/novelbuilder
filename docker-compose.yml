services:
  novelbuilder:
    image: novelbuilder
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nb
    ports:
      - "8080:8080"
    volumes:
      # Named volumes — persisted across container rebuilds.
      # All four are required; omitting any will cause data loss on recreation.
      - novelbuilder-pg:/var/lib/postgresql/data       # PostgreSQL: projects, chapters, characters...
      - novelbuilder-qdrant:/var/lib/qdrant            # Qdrant: vector index (RAG rebuild results)
      - novelbuilder-neo4j:/opt/neo4j/data             # Neo4j: knowledge graph
      - novelbuilder-uploads:/data/uploads             # Uploaded reference books (txt/pdf files)
    restart: unless-stopped
    environment:
      APP_PROFILE: full
      DB_DRIVER: postgres
      # Optional overrides:
      # ADMIN_USERNAME: spiritlhl
      # ADMIN_PASSWORD: change-this
      # SESSION_TTL_HOURS: "24"
      # DB_PASSWORD: changeme
      # NEO4J_PASSWORD: changeme

volumes:
  novelbuilder-pg:
  novelbuilder-qdrant:
  novelbuilder-neo4j:
  novelbuilder-uploads:
