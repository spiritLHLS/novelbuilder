services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: novelbuilder
      POSTGRES_USER: novelbuilder
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env before starting docker-compose.multi.yml}
    volumes:
      - novelbuilder-multi-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U novelbuilder -d novelbuilder"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "900", "1", "--save", "300", "10"]
    volumes:
      - novelbuilder-multi-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.12.0
    volumes:
      - novelbuilder-multi-qdrant:/qdrant/storage
    profiles: ["full", "vector"]

  neo4j:
    image: neo4j:5.24-community
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:?Set NEO4J_PASSWORD in .env before starting graph profiles}
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 512m
      NEO4J_server_memory_pagecache_size: 128m
    volumes:
      - novelbuilder-multi-neo4j:/data
    profiles: ["full", "graph"]

  app:
    image: novelbuilder:app
    build:
      context: .
      dockerfile: Dockerfile.app
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_PROFILE: ${APP_PROFILE:-multi}
      DB_DRIVER: postgres
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: novelbuilder
      DB_USER: novelbuilder
      DB_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env before starting docker-compose.multi.yml}
      REDIS_ENABLED: "true"
      REDIS_ADDR: redis:6379
      REDIS_URL: redis://redis:6379
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:?Set NEO4J_PASSWORD in .env before starting graph profiles}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
    volumes:
      - novelbuilder-multi-uploads:/data/uploads
    networks:
      default:
        aliases:
          - novelbuilder
    restart: unless-stopped

volumes:
  novelbuilder-multi-pg:
  novelbuilder-multi-redis:
  novelbuilder-multi-qdrant:
  novelbuilder-multi-neo4j:
  novelbuilder-multi-uploads:
