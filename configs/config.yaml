# NovelBuilder configuration is managed entirely through environment variables
# and the frontend Settings pages. This file is intentionally empty.
#
# Infrastructure overrides (optional — defaults work for the bundled container):
#   SERVER_PORT=8080
#   DB_HOST=127.0.0.1  DB_PORT=5432  DB_USER=novelbuilder  DB_PASSWORD=novelbuilder  DB_NAME=novelbuilder
#   REDIS_ADDR=127.0.0.1:6379
#   SIDECAR_URL=http://127.0.0.1:8081
#   TASK_WORKERS=4  TASK_MAX_RETRIES=3
#
# AI API keys and all other application settings are configured in the UI:
#   Settings → AI 模型配置   (add LLM profiles with API keys)
#   Settings → 系统设置       (quality thresholds and other app config)
