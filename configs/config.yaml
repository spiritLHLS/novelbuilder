server:
  host: "0.0.0.0"
  port: 8080
  mode: "release"

database:
  host: "localhost"
  port: 5432
  user: "novelbuilder"
  password: "novelbuilder_secret"
  dbname: "novelbuilder"
  sslmode: "disable"
  max_open_conns: 25
  max_idle_conns: 5

redis:
  addr: "localhost:6379"
  password: ""
  db: 0

python_sidecar:
  url: "http://localhost:8081"
  timeout: 600

# ── Neo4j (graph memory) ──────────────────────────────────────────────────────
neo4j:
  uri: "${NEO4J_URI:-bolt://localhost:7687}"
  user: "${NEO4J_USER:-neo4j}"
  password: "${NEO4J_PASSWORD:-novelbuilder}"

# ── Qdrant (vector store) ─────────────────────────────────────────────────────
qdrant:
  url: "${QDRANT_URL:-http://localhost:6333}"

ai_gateway:
  default_model: "deepseek-v3"
  models:
    claude-sonnet:
      provider: "anthropic"
      api_key: "${ANTHROPIC_API_KEY}"
      model: "claude-sonnet-4-20250514"
      base_url: "https://api.anthropic.com"
      max_tokens: 8192
    gpt-4o:
      provider: "openai"
      api_key: "${OPENAI_API_KEY}"
      model: "gpt-4o"
      base_url: "https://api.openai.com/v1"
      max_tokens: 8192
    deepseek-v3:
      provider: "openai"
      api_key: "${DEEPSEEK_API_KEY}"
      model: "deepseek-chat"
      base_url: "https://api.deepseek.com/v1"
      max_tokens: 8192
    gpt-4o-mini:
      provider: "openai"
      api_key: "${OPENAI_API_KEY}"
      model: "gpt-4o-mini"
      base_url: "https://api.openai.com/v1"
      max_tokens: 4096

  task_routing:
    world_building: "claude-sonnet"
    chapter_writing_ancient: "deepseek-v3"
    chapter_writing_urban: "deepseek-v3"
    chapter_writing_scifi: "claude-sonnet"
    humanization: "deepseek-v3"
    quality_check: "gpt-4o-mini"
    outline_generation: "claude-sonnet"
    review_chain: "gpt-4o-mini"

quality:
  ai_score_threshold: 35
  originality_threshold: 0.7
  min_reward_density: 1.5
  burstiness_target_cv: 0.8

security:
  encryption_key: "${ENCRYPTION_KEY}"

task_queue:
  workers: 4
  max_retries: 3

workflow:
  strict_review: true
